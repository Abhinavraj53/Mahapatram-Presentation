<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MahPatram - Slide 14 - Section Divider</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Open+Sans:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; background-color: #f1f5f9; }
        .slide-container { 
            width: 1280px; 
            height: 720px; 
            background-color: #ffffff; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Montserrat', sans-serif; }
        
        /* Logo Component */
        .logo-container {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
            width: 120px;
            height: 120px;
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Minimalist Accent Elements */
        .accent-corner {
            position: absolute;
            top: 0;
            left: 0;
            width: 180px;
            height: 180px;
            background-color: #1e3a5f;
            clip-path: polygon(0 0, 100% 0, 0 100%);
            opacity: 0.1;
        }
        
        .accent-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 240px;
            height: 12px;
            background-color: #1e3a5f;
        }
        
        .accent-line-vertical {
            width: 4px;
            height: 120px;
            background-color: #f97316;
            margin-bottom: 24px;
        }
        
        /* Grid Pattern simulated with background image for no-gradient rule */
        .grid-pattern {
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23cbd5e1' fill-opacity='0.4'/%3E%3C/svg%3E");
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="slide-container shadow-2xl">
<!-- Logo -->
<div class="logo-container">
<img src="Mahapatram Logo.png" alt="MahPatram Logo" />
</div>
<!-- Background Elements -->
<div class="accent-corner"></div>
<div class="grid-pattern"></div>
<div class="accent-bottom-right"></div>
<!-- Main Content (Centered) -->
<div class="flex-1 flex flex-col justify-center items-center z-10 px-24">
<!-- Vertical Accent Line -->
<div class="accent-line-vertical"></div>
<!-- Section Title -->
<h1 class="text-6xl font-extrabold text-[#1e3a5f] tracking-tight mb-6 text-center leading-tight">
                Client Impact
            </h1>
<!-- Subtitle -->
<div class="flex items-center gap-4 text-[#64748b] text-2xl font-light tracking-wide">
<p>Quantified outcomes across sectors</p>
</div>
<!-- Transition Icon -->
<div class="mt-24 animate-bounce">
<i class="fas fa-chevron-down text-[#94a3b8] text-3xl"></i>
</div>
</div>
<!-- Slide Number -->
<div class="absolute bottom-6 right-8 text-[#94a3b8] text-sm font-semibold">14</div>
</div>
</body>
</html>
